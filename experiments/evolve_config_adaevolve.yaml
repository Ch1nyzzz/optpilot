# AdaEvolve config for MAS DAG evolution (Python code mode)
# Adaptive multi-island search with UCB island selection + intensity adaptation.

max_iterations: 50
checkpoint_interval: 5
log_level: "INFO"
language: "python"
file_suffix: ".py"

llm:
  models:
    - name: "together/openai/gpt-oss-120b"
      weight: 1.0
  temperature: 0.7
  max_tokens: 16384
  timeout: 120

search:
  type: "adaevolve"
  num_context_programs: 4
  database:
    num_islands: 3
    population_size: 20
    archive_size: 3

    # Adaptive intensity (G-based)
    decay: 0.9
    intensity_min: 0.1
    intensity_max: 0.7

    # UCB island selection
    use_adaptive_search: true
    use_ucb_selection: true

    # Migration (ring topology)
    use_migration: true
    migration_interval: 10
    migration_count: 3

    # Quality-diversity archive per island
    use_unified_archive: true
    feature_dimensions: ["score", "complexity"]
    feature_bins: 10
    diversity_reference_size: 20

    # Paradigm breakthrough (high-level strategy shifts when stuck)
    use_paradigm_breakthrough: true
    paradigm_window_size: 30
    paradigm_improvement_threshold: 0.05
    paradigm_max_uses: 5
    paradigm_max_tried: 10
    paradigm_num_to_generate: 3

    # Dynamic island spawning (disabled by default)
    use_dynamic_islands: false
    max_islands: 8
    spawn_productivity_threshold: 0.02

    random_seed: 42

prompt:
  system_message: |
    You are an expert multi-agent system (MAS) architect.
    Your task is to iteratively improve the `_build_core()` function inside the
    EVOLVE-BLOCK markers. This function defines the core multi-agent DAG for
    solving tasks.

    ## CRITICAL: Frozen vs Evolvable Code
    The code has two regions:
    - **EVOLVE-BLOCK** (between `# EVOLVE-BLOCK-START` and `# EVOLVE-BLOCK-END`):
      You may ONLY modify code inside this block.
    - **FROZEN** (everything outside the markers): DO NOT modify. This includes
      `ANSWER_INSTRUCTION`, `TERMINATION_CONDITION`, `build_dag()`, and the
      `USER`/`FINAL` nodes. These ensure correct answer extraction.

    ## How _build_core() Works
    The function returns a dict with:
    - `agents`: list of agent node dicts
    - `extra_nodes`: optional list of non-agent nodes (e.g. LoopCounter)
    - `edges`: list of edge dicts (connections between agents; do NOT add
      edges to FINAL — the frozen wrapper handles that)
    - `introduction`: str (introduction content)
    - `terminal_agent`: str (id of the agent that produces the final answer;
      the frozen wrapper appends ANSWER_INSTRUCTION to this agent's prompt
      and connects it to FINAL with SOLUTION_FOUND keyword detection)

    ## DAG Structure (assembled by frozen build_dag)
    The final DAG has these top-level keys:
    - `dag_id`: string identifier
    - `nodes`: list of node dicts
    - `edges`: list of edge dicts
    - `metadata`: dict with `start`, `success_nodes`, `description`

    ## Node Types
    Each node is a dict with `id`, `type`, and type-specific fields:
    - `agent`: LLM-powered node. Fields: `role` (system prompt string), `config.params.temperature`, `config.params.max_tokens`
    - `literal`: Fixed text. Fields: `config.content`, `config.role`
    - `loop_counter`: Iteration tracker. Fields: `config.max_iterations`, `config.reset_on_emit`, `config.message`
    - `passthrough`: Routes data without processing. Fields: `config` (empty dict)

    ## Edge Semantics
    Each edge is a dict with:
    - `from`, `to`: node IDs (must exist in nodes list)
    - `trigger`: bool — if True, activates the target node to execute
    - `carry_data`: bool — if True, passes source output to target's input
    - `condition`: either the string `"true"` (always fire) or a keyword-matching dict:
      ```python
      {"type": "keyword", "config": {"any": ["SOLUTION_FOUND"], "none": [], "regex": [], "case_sensitive": True}}
      ```
    - `loop`: optional, `"exit"` or `"continue"` for loop counter edges

    ## Adding a New Agent
    This is straightforward in Python — just add a dict to the `nodes` list and
    corresponding edges. Example:
    ```python
    # Add a Planner agent between Problem_Solver and Code_Executor
    nodes.append({"id": "Agent_Planner", "type": "agent",
                  "role": "You are a planning agent...",
                  "config": {"params": {"temperature": 0.2, "max_tokens": 8192}}})
    edges.append({"from": "Agent_Problem_Solver", "to": "Agent_Planner",
                  "trigger": True, "condition": "true", "carry_data": True})
    edges.append({"from": "Agent_Planner", "to": "Agent_Code_Executor",
                  "trigger": True, "condition": "true", "carry_data": True})
    ```

    ## Constraints
    - ONLY modify code inside the EVOLVE-BLOCK. Never touch frozen code.
    - Do NOT add edges to FINAL — the frozen wrapper does this automatically.
    - Do NOT include answer format instructions in agent prompts — the frozen
      wrapper appends ANSWER_INSTRUCTION to the terminal agent.
    - `terminal_agent` must be a valid agent id from the `agents` list.
    - All edge `from`/`to` must reference existing node IDs or the fixed
      IDs: `USER`, `Introduction`.

    ## What You Can Modify (inside EVOLVE-BLOCK only)
    1. Agent prompts (the `role` string) — improve instructions, add constraints
    2. Agent parameters — temperature, max_tokens
    3. **Add new agents** — append to agents list + add edges (ENCOURAGED)
    4. Remove non-essential agents — remove from list + clean up edges
    5. Edge routing — change triggers, conditions, carry_data between agents
    6. Loop counter settings — max_iterations in LoopCounter config
    7. Introduction content — update to mention new agents
    8. Change `terminal_agent` — point to a different agent as the answer producer
    9. Add tools to agents — e.g. `"tools": ["web_search", "calculator"]`

    ## Optimization Objective
    Maximize the COMBINED_SCORE which combines:
    - Task accuracy (correct answers)
    - Minimize failure modes (instruction non-compliance, execution loops,
      context loss, communication failure, task drift, verification failure)

    Think carefully about architectural changes. Small prompt improvements AND
    structural changes (adding/reorganizing agents) are both valid strategies.
    Consider adding specialized agents (e.g., planner, checker, reformulator)
    if the failure analysis suggests they would help.

evaluator:
  timeout: 1200
  max_retries: 2
  cascade_evaluation: false

diff_based_generation: true
max_solution_length: 60000
max_parallel_iterations: 3
