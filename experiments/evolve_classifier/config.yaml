# AdaEvolve config for FM Classifier prompt optimization
# Evolves the CLASSIFICATION_PROMPT to maximize macro-F1 on MAST-annotated AG2 traces

language: python
max_iterations: 30
checkpoint_interval: 5
log_level: "INFO"
random_seed: 42

# LLM for evolution (gpt-oss-120b via Together AI)
llm:
  models:
    - name: "together/openai/gpt-oss-120b"
      weight: 1.0
  api_base: "https://api.together.xyz/v1"
  # API key loaded from TOGETHER_API_KEY / TOGETHER_AI_API_KEY / together_ai_api.
  temperature: 0.7
  max_tokens: 16000
  timeout: 300

# AdaEvolve search
search:
  type: "adaevolve"
  num_context_programs: 3
  database:
    population_size: 15
    num_islands: 2
    decay: 0.9
    intensity_min: 0.15
    intensity_max: 0.5
    use_adaptive_search: true
    use_ucb_selection: true
    use_migration: true
    use_unified_archive: true
    migration_interval: 10
    migration_count: 3
    fitness_weight: 1.0
    novelty_weight: 0.0
    diversity_strategy: "code"
    use_dynamic_islands: true
    max_islands: 4
    spawn_productivity_threshold: 0.015
    spawn_cooldown_iterations: 15
    use_paradigm_breakthrough: true
    paradigm_window_size: 8
    paradigm_improvement_threshold: 0.1
    paradigm_max_uses: 2
    paradigm_max_tried: 8
    paradigm_num_to_generate: 2
    enable_error_retry: true
    max_error_retries: 2

prompt:
  system_message: |-
    You are optimizing a prompt template for a multi-agent system (MAS) failure mode
    classifier. The prompt is used inside a Python function that sends it to an LLM
    (MiniMax-M2.5) and parses the JSON response to classify 14 failure modes.

    The CLASSIFICATION_PROMPT string is the only thing being evolved. The classify()
    function and JSON parsing logic should remain stable.

    Current performance: Macro-F1 ~0.13 across 14 failure modes on MAST-annotated
    AG2 traces. The main bottleneck is very low recall — the classifier almost
    never predicts "true" for most failure modes.

    Key failure modes that need improvement:
    - FM-1.3 Step Repetition: "unnecessary duplication of completed phases" —
      includes subtle cases like re-deriving already-established results,
      agents repeating the same verification pattern, not just literal loops.
    - FM-1.5 Unaware of Termination: agent continues past task completion.
    - FM-2.6 Action-Reasoning Mismatch: stated reasoning doesn't match output.

    The LLM doing classification is MiniMax-M2.5, a mid-tier chat model (not a
    reasoning model like o1). Keep the prompt concise — very long prompts degrade
    performance on this model. Focus on:
    - Clear, actionable definitions with concrete examples
    - Encouraging the model to be more sensitive (higher recall) without
      sacrificing too much precision
    - Making subtle failure patterns easier to detect

    The output format must remain as a JSON object with FM IDs as keys and
    true/false as values. Do NOT change the classify() function signature
    or the JSON parsing code.

evaluator:
  timeout: 300
  max_retries: 2
  cascade_evaluation: false

diff_based_generation: true
max_solution_length: 30000

monitor:
  enabled: true
