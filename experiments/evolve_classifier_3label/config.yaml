# AdaEvolve config for coarse 3-label FM category optimization

language: python
max_iterations: 30
checkpoint_interval: 5
log_level: "INFO"
random_seed: 42

llm:
  models:
    - name: "together/openai/gpt-oss-120b"
      weight: 1.0
  api_base: "https://api.together.xyz/v1"
  # API key loaded from TOGETHER_API_KEY / TOGETHER_AI_API_KEY / together_ai_api.
  temperature: 0.7
  max_tokens: 12000
  timeout: 300

search:
  type: "adaevolve"
  num_context_programs: 3
  database:
    population_size: 15
    num_islands: 2
    decay: 0.9
    intensity_min: 0.15
    intensity_max: 0.5
    use_adaptive_search: true
    use_ucb_selection: true
    use_migration: true
    use_unified_archive: true
    migration_interval: 10
    migration_count: 3
    fitness_weight: 1.0
    novelty_weight: 0.0
    diversity_strategy: "code"
    use_dynamic_islands: true
    max_islands: 4
    spawn_productivity_threshold: 0.015
    spawn_cooldown_iterations: 15
    use_paradigm_breakthrough: true
    paradigm_window_size: 8
    paradigm_improvement_threshold: 0.1
    paradigm_max_uses: 2
    paradigm_max_tried: 8
    paradigm_num_to_generate: 2
    enable_error_retry: true
    max_error_retries: 2

prompt:
  system_message: |-
    You are optimizing a prompt template for a multi-agent system (MAS) coarse
    failure-category classifier.

    The target output has exactly three independent boolean labels:
    - C1: Agent Compliance
    - C2: Inter-Agent Communication
    - C3: Verification

    The CLASSIFICATION_PROMPT string is the main object being optimized. Keep the
    classifier simple and stable. Focus on making the three labels easy to detect
    from textual evidence in the trace.

    Important:
    - The task is multi-label, not single-label. More than one category may be true.
    - Prefer concise instructions and concrete category boundaries.
    - The output format must remain a JSON object with exactly C1/C2/C3 keys.

evaluator:
  timeout: 300
  max_retries: 2
  cascade_evaluation: false

diff_based_generation: true
max_solution_length: 30000

monitor:
  enabled: true
