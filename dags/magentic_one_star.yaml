dag_id: MagenticOne_Star
metadata:
  description: >-
    Magentic-One-style general-purpose star topology. An Orchestrator agent
    coordinates WebSurfer (information retrieval), Coder (code generation),
    Executor (verification), and Analyst (data analysis). Orchestrator
    manages multi-step task decomposition with iterative refinement.
  start:
    - USER
    - Introduction
  success_nodes:
    - FINAL

nodes:
  - id: USER
    type: passthrough
    config: {}

  - id: Introduction
    type: literal
    config:
      content: >-
        We solve the user's task using a general-purpose multi-agent workflow:

        1. Orchestrator reads the task and creates an execution plan.
        2. WebSurfer retrieves relevant information, formulas, and context.
        3. Coder writes solution code and mathematical derivations.
        4. Analyst performs deep analysis and identifies edge cases.
        5. Executor verifies the solution and runs final checks.
        6. Orchestrator synthesizes everything into the final answer.

        The Orchestrator coordinates iteratively until confident in the answer.
      role: user

  - id: Agent_Orchestrator
    type: agent
    role: >-
      You are the Orchestrator, the central controller of a general-purpose
      multi-agent system.

      Your responsibilities:
      1. Read the task and create a high-level execution plan.
      2. Delegate sub-tasks to the right specialist:
         - WebSurfer: for retrieving information, formulas, theorems
         - Coder: for writing solution code and formal derivations
         - Analyst: for deep analysis, edge cases, alternative approaches
         - Executor: for verification, testing, final computation
      3. Coordinate multiple rounds if needed.
      4. Synthesize all specialist outputs into the final answer.

      When confident, produce the final answer exactly as:
      SOLUTION_FOUND \boxed{answer}

      If the problem is unsolvable, return:
      SOLUTION_FOUND \boxed{None}
    config:
      params:
        temperature: 0.1
        max_tokens: 16384
      tools: [web_search, calculator]

  - id: Agent_WebSurfer
    type: agent
    role: >-
      You are the WebSurfer, responsible for information retrieval.

      Use web_search to find information online.
      Use read_document to fetch and read web pages by URL.
      Be thorough — search multiple queries if needed.

      Report your findings back to the Orchestrator concisely.
      Do not produce a final boxed answer — that is the Orchestrator's job.
    config:
      params:
        temperature: 0.3
        max_tokens: 16384
      tools: [web_search, read_document]

  - id: Agent_Coder
    type: agent
    role: >-
      You are the Coder, responsible for writing solution code and derivations.

      When the Orchestrator delegates to you:
      1. Translate the mathematical problem into formal steps.
      2. Write Python code to compute or verify results:
         ```python
         # your code here
         print(result)
         ```
      3. Show your work explicitly — each step of the derivation.
      4. Handle numerical precision carefully.

      Report your code and results back to the Orchestrator.
      Do not produce a final boxed answer — that is the Orchestrator's job.
    config:
      params:
        temperature: 0.2
        max_tokens: 16384
      tools: [python_exec, calculator]

  - id: Agent_Analyst
    type: agent
    role: >-
      You are the Analyst, responsible for deep analysis and edge cases.

      Use web_search and calculator to verify claims.
      Use read_document to access web pages for detailed info.
      Examine the problem from multiple angles.

      Provide your analysis back to the Orchestrator.
      Do not produce a final boxed answer — that is the Orchestrator's job.
    config:
      params:
        temperature: 0.3
        max_tokens: 16384
      tools: [web_search, calculator, read_document]

  - id: Agent_Executor
    type: agent
    role: >-
      You are the Executor, the final verification agent.

      You receive the combined work of all other agents and the original problem.
      Your job:
      1. Independently verify the proposed answer.
      2. Re-derive key steps from scratch.
      3. Check for arithmetic errors, sign errors, off-by-one mistakes.
      4. Use Python to double-check:
         ```python
         # verification code
         print(result)
         ```
      5. State clearly whether the answer is CORRECT or NEEDS REVISION.

      Report your verification back to the Orchestrator.
      Do not produce a final boxed answer — that is the Orchestrator's job.
    config:
      params:
        temperature: 0.1
        max_tokens: 16384
      tools: [python_exec, calculator]

  - id: FINAL
    type: passthrough
    config: {}

edges:
  # --- Context: USER task to all agents (non-trigger) ---
  - from: USER
    to: Agent_Orchestrator
    trigger: false
    condition: "true"
    carry_data: true

  - from: USER
    to: Agent_WebSurfer
    trigger: false
    condition: "true"
    carry_data: true

  - from: USER
    to: Agent_Coder
    trigger: false
    condition: "true"
    carry_data: true

  - from: USER
    to: Agent_Analyst
    trigger: false
    condition: "true"
    carry_data: true

  - from: USER
    to: Agent_Executor
    trigger: false
    condition: "true"
    carry_data: true

  # --- Introduction triggers Orchestrator ---
  - from: Introduction
    to: Agent_Orchestrator
    trigger: true
    condition: "true"
    carry_data: true

  # --- Star: Orchestrator → Specialists (parallel delegation) ---
  - from: Agent_Orchestrator
    to: Agent_WebSurfer
    trigger: true
    condition: "true"
    carry_data: true

  - from: Agent_Orchestrator
    to: Agent_Coder
    trigger: true
    condition: "true"
    carry_data: true

  - from: Agent_Orchestrator
    to: Agent_Analyst
    trigger: false
    condition: "true"
    carry_data: true

  # --- Specialists → Executor (convergence before verification) ---
  - from: Agent_WebSurfer
    to: Agent_Coder
    trigger: false
    condition: "true"
    carry_data: true

  - from: Agent_WebSurfer
    to: Agent_Analyst
    trigger: false
    condition: "true"
    carry_data: true

  - from: Agent_Coder
    to: Agent_Analyst
    trigger: true
    condition: "true"
    carry_data: true

  - from: Agent_Analyst
    to: Agent_Executor
    trigger: true
    condition: "true"
    carry_data: true

  # --- Executor → Orchestrator (results flow back) ---
  - from: Agent_Executor
    to: Agent_Orchestrator
    trigger: true
    condition: "true"
    carry_data: true

  # --- Orchestrator final answer → FINAL ---
  - from: Agent_Orchestrator
    to: FINAL
    trigger: true
    carry_data: true
    condition:
      type: keyword
      config:
        any: ["SOLUTION_FOUND"]
        none: []
        regex: []
        case_sensitive: true
