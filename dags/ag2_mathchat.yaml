dag_id: AG2_MathChat
metadata:
  description: >
    AG2 MathChat: context-preserving 3-agent math workflow.
    Problem Solver reasons first, Code Executor checks with Python, and Verifier returns the final boxed answer.
  start:
    - USER
    - Introduction
  success_nodes:
    - FINAL

nodes:
  - id: USER
    type: passthrough
    config: {}

  - id: Introduction
    type: literal
    config:
      content: |-
        We will solve the user's math task with a fixed workflow:

        1. Agent_Problem_Solver reasons from the original problem statement.
        2. Agent_Code_Executor checks the reasoning with Python when useful.
        3. Agent_Verifier synthesizes the evidence and returns the final boxed answer.

        Keep the original task in view throughout the workflow. Do not ask for another speaker.
      role: user

  - id: Agent_Problem_Solver
    type: agent
    role: |-
      You are Agent Problem Solver.

      Solve the user's task directly from the original problem statement.
      Provide a concise step-by-step mathematical solution.
      State any assumptions explicitly instead of inventing missing facts.
      Do not ask for another speaker, and do not emit routing directives.
    config:
      params:
        temperature: 0.2
        max_tokens: 16384

  - id: Agent_Code_Executor
    type: agent
    role: |-
      You are Agent Code Executor.

      You receive the original task together with earlier reasoning. Use Python only when it materially helps verify or compute the answer.
      If you write code, keep it inside:
      ```python
      # your code here
      print(result)
      ```

      After the code block, summarize what the computation verified.
      Do not ask for the problem again, and do not emit speaker-routing directives.
    config:
      params:
        temperature: 0.2
        max_tokens: 16384

  - id: Agent_Verifier
    type: agent
    role: |-
      You are Agent Verifier, the final decision maker.

      Use the original problem statement together with the Problem Solver and Code Executor outputs.
      Check for missing assumptions, arithmetic mistakes, and disagreement between the two analyses.
      Do not ask for another speaker.

      When you are confident, return the final answer exactly as:
      SOLUTION_FOUND \boxed{answer}

      If the information is insufficient or the problem is genuinely unsolvable from the given data, return:
      SOLUTION_FOUND \boxed{None}

      Only place the answer itself inside \boxed{}.
    config:
      params:
        temperature: 0.1
        max_tokens: 16384

  - id: FINAL
    type: passthrough
    config: {}

edges:
  - from: USER
    to: Agent_Problem_Solver
    trigger: false
    condition: 'true'
    carry_data: true

  - from: USER
    to: Agent_Code_Executor
    trigger: false
    condition: 'true'
    carry_data: true

  - from: USER
    to: Agent_Verifier
    trigger: false
    condition: 'true'
    carry_data: true

  - from: Introduction
    to: Agent_Problem_Solver
    trigger: true
    condition: 'true'
    carry_data: true

  - from: Agent_Problem_Solver
    to: Agent_Code_Executor
    trigger: true
    condition: 'true'
    carry_data: true

  - from: Agent_Problem_Solver
    to: Agent_Verifier
    trigger: false
    condition: 'true'
    carry_data: true

  - from: Agent_Code_Executor
    to: Agent_Verifier
    trigger: true
    condition: 'true'
    carry_data: true

  - from: Agent_Verifier
    to: FINAL
    trigger: true
    condition:
      type: keyword
      config:
        any:
          - "SOLUTION_FOUND"
        none: []
        regex: []
        case_sensitive: true
    carry_data: true
