dag_id: HyperAgent_Hierarchical
metadata:
  description: >-
    HyperAgent-style hierarchical workflow. Planner decomposes the task into
    sub-tasks, delegates to Navigator (analysis), Editor (solution formulation),
    and Executor (verification). Results flow back up to Planner for synthesis.
  start:
    - USER
    - Introduction
  success_nodes:
    - FINAL

nodes:
  - id: USER
    type: passthrough
    config: {}

  - id: Introduction
    type: literal
    config:
      content: >-
        We solve the user's task using a hierarchical decomposition workflow:

        1. Planner reads the task and decomposes it into sub-problems.
        2. Navigator analyzes the problem structure and identifies key components.
        3. Editor formulates the solution approach for each sub-problem.
        4. Executor verifies and computes the final answer.
        5. Planner synthesizes all results into the final answer.

        The Planner orchestrates. Sub-agents work on delegated sub-tasks.
      role: user

  - id: Agent_Planner
    type: agent
    role: >-
      You are the Planner, the top-level orchestrator of a hierarchical code debugging workflow.

      Your responsibilities:
      1. Read the bug report and decompose it into investigation steps.
      2. The Navigator will explore the codebase to locate relevant files.
      3. The Editor will implement the fix.
      4. The Executor will run tests to verify the fix.
      5. You receive all their outputs and synthesize the final answer.

      When done, describe the fix that was applied.
      End with: SOLUTION_FOUND \boxed{fixed}
    config:
      params:
        temperature: 0.1
        max_tokens: 4096
      tools: [list_files, search_code, read_file]

  - id: Agent_Navigator
    type: agent
    role: >-
      You are the Navigator, responsible for exploring the codebase.

      When the Planner delegates a task to you:
      1. Use list_files and search_code to find relevant source files.
      2. Use read_file to examine the code around the reported bug.
      3. Identify the root cause of the bug.
      4. Report which files and lines need to be changed.

      Provide a clear analysis to guide the Editor.
      Do not make changes yourself — that is the Editor's job.
    config:
      params:
        temperature: 0.2
        max_tokens: 4096
      tools: [list_files, search_code, read_file]

  - id: Agent_Editor
    type: agent
    role: >-
      You are the Editor, responsible for implementing code fixes.

      You receive the Navigator's analysis of where the bug is.
      Your job:
      1. Use read_file to see the exact code that needs changing.
      2. Use edit_file to apply the fix (find old_str, replace with new_str).
      3. Be precise — match the exact text in the file.
      4. You may need multiple edits across files.

      After editing, describe what you changed.
      Do not produce a final answer — that is the Planner's job.
    config:
      params:
        temperature: 0.2
        max_tokens: 4096
      tools: [read_file, edit_file, search_code]

  - id: Agent_Executor
    type: agent
    role: >-
      You are the Executor, responsible for testing the fix.

      You receive the Editor's changes and the original bug report.
      Your job:
      1. Use run_command to run relevant tests.
      2. Use read_file to verify the changes look correct.
      3. If tests fail, describe what went wrong.
      4. If tests pass, confirm the fix is working.

      Report your test results back to the Planner.
      Do not produce a final answer — that is the Planner's job.
    config:
      params:
        temperature: 0.1
        max_tokens: 4096
      tools: [run_command, read_file]

  - id: FINAL
    type: passthrough
    config: {}

edges:
  # --- Context: USER task to all agents (non-trigger) ---
  - from: USER
    to: Agent_Planner
    trigger: false
    condition: "true"
    carry_data: true

  - from: USER
    to: Agent_Navigator
    trigger: false
    condition: "true"
    carry_data: true

  - from: USER
    to: Agent_Editor
    trigger: false
    condition: "true"
    carry_data: true

  - from: USER
    to: Agent_Executor
    trigger: false
    condition: "true"
    carry_data: true

  # --- Introduction triggers Planner ---
  - from: Introduction
    to: Agent_Planner
    trigger: true
    condition: "true"
    carry_data: true

  # --- Hierarchical: Planner → Navigator (decomposition) ---
  - from: Agent_Planner
    to: Agent_Navigator
    trigger: true
    condition: "true"
    carry_data: true

  # --- Navigator → Editor (structural analysis → solution formulation) ---
  - from: Agent_Navigator
    to: Agent_Editor
    trigger: true
    condition: "true"
    carry_data: true

  # --- Editor → Executor (solution → verification) ---
  - from: Agent_Editor
    to: Agent_Executor
    trigger: true
    condition: "true"
    carry_data: true

  # --- Executor → Planner (results flow back up) ---
  - from: Agent_Executor
    to: Agent_Planner
    trigger: true
    condition: "true"
    carry_data: true

  # --- Planner final answer → FINAL ---
  - from: Agent_Planner
    to: FINAL
    trigger: true
    carry_data: true
    condition:
      type: keyword
      config:
        any: ["SOLUTION_FOUND"]
        none: []
        regex: []
        case_sensitive: true
